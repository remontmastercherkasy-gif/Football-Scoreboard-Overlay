<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: Arial, sans-serif; 
            background: transparent;
            overflow: hidden;
        }
        .scoreboard {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, #1a1a1a 0%, #000 50%, #1a1a1a 100%);
            border-radius: 10px;
            padding: 15px 30px;
            color: white;
            margin: 50px auto;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .team {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        .team.right {
            flex-direction: row-reverse;
            text-align: right;
            justify-content: flex-end;
        }
        .logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .team-name {
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .score-box {
            text-align: center;
            margin: 0 20px;
        }
        .score {
            font-size: 48px;
            font-weight: 900;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .timer {
            background: #333;
            padding: 5px 15px;
            border-radius: 5px;
            margin-top: 5px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }
        .period {
            background: #ffd700;
            color: black;
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="scoreboard">
        <div class="team">
            <div class="logo"><img id="logoA" src=""></div>
            <div class="team-name" id="nameA">TEAM A</div>
        </div>
        
        <div class="score-box">
            <div class="score">
                <span id="scoreA">0</span>
                <span>-</span>
                <span id="scoreB">0</span>
            </div>
            <div class="timer">
                <span class="period" id="period">P1</span>
                <span id="time">00:00</span>
            </div>
        </div>
        
        <div class="team right">
            <div class="logo"><img id="logoB" src=""></div>
            <div class="team-name" id="nameB">TEAM B</div>
        </div>
    </div>

    <script>
        // Завантаження даних кожні 2 секунди
        function loadData() {
            fetch('data.json?t=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    document.getElementById('scoreA').textContent = data.scoreA;
                    document.getElementById('scoreB').textContent = data.scoreB;
                    document.getElementById('nameA').textContent = data.nameA;
                    document.getElementById('nameB').textContent = data.nameB;
                    document.getElementById('time').textContent = data.time;
                    document.getElementById('period').textContent = data.period;
                    if(data.logoA) document.getElementById('logoA').src = data.logoA;
                    if(data.logoB) document.getElementById('logoB').src = data.logoB;
                })
                .catch(e => console.log('Waiting for data...'));
        }
        
        loadData();
        setInterval(loadData, 2000);
    </script>
</body>
</html>
