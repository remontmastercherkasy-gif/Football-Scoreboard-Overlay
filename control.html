<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
            margin: 0;
        }
        .card {
            background: #2a2a2a;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
        h2 { margin-top: 0; color: #ffd700; }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .btn-green { background: #28a745; color: white; }
        .btn-red { background: #dc3545; color: white; }
        .btn-blue { background: #007bff; color: white; }
        .btn-gray { background: #6c757d; color: white; }
        .score-ctrl {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }
        .score-display {
            font-size: 36px;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        #status {
            background: #000;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="status">🟢 Підключено</div>
    
    <div class="card">
        <h2>⏱ Час матчу</h2>
        <div class="score-ctrl">
            <span style="font-size: 32px; font-family: monospace;" id="dispTime">00:00</span>
        </div>
        <div class="grid">
            <button class="btn-green" onclick="startTimer()">▶ СТАРТ</button>
            <button class="btn-gray" onclick="pauseTimer()">⏸ ПАУЗА</button>
        </div>
        <div class="grid" style="margin-top: 10px;">
            <button class="btn-blue" onclick="setPeriod('P1')">1 Тайм</button>
            <button class="btn-blue" onclick="setPeriod('P2')">2 Тайм</button>
        </div>
        <div style="margin-top: 10px; display: flex; gap: 5px;">
            <input type="number" id="min" placeholder="Хв" style="flex:1">
            <input type="number" id="sec" placeholder="Сек" style="flex:1">
            <button class="btn-gray" onclick="setManualTime()">OK</button>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>🔵 Команда A</h2>
            <input type="text" id="nameA" placeholder="Назва" oninput="update()">
            <input type="file" id="logoA" accept="image/*" onchange="handleLogo('A')">
            <div class="score-ctrl">
                <button class="btn-red" onclick="changeScore('A', -1)">-</button>
                <span class="score-display" id="scoreA">0</span>
                <button class="btn-green" onclick="changeScore('A', 1)">+</button>
            </div>
        </div>

        <div class="card">
            <h2>🔴 Команда B</h2>
            <input type="text" id="nameB" placeholder="Назва" oninput="update()">
            <input type="file" id="logoB" accept="image/*" onchange="handleLogo('B')">
            <div class="score-ctrl">
                <button class="btn-red" onclick="changeScore('B', -1)">-</button>
                <span class="score-display" id="scoreB">0</span>
                <button class="btn-green" onclick="changeScore('B', 1)">+</button>
            </div>
        </div>
    </div>

    <script>
        let data = {
            scoreA: 0,
            scoreB: 0,
            time: '00:00',
            period: 'P1',
            nameA: 'TEAM A',
            nameB: 'TEAM B',
            logoA: '',
            logoB: ''
        };

        let timerInterval;
        let seconds = 0;
        let running = false;

        function saveData() {
            fetch('save', {
                method: 'POST',
                body: JSON.stringify(data)
            }).catch(() => {
                // Збереження в localStorage як резерв
                localStorage.setItem('scoreboard', JSON.stringify(data));
            });
        }

        function changeScore(team, delta) {
            if(team === 'A') {
                data.scoreA += delta;
                if(data.scoreA < 0) data.scoreA = 0;
                document.getElementById('scoreA').textContent = data.scoreA;
            } else {
                data.scoreB += delta;
                if(data.scoreB < 0) data.scoreB = 0;
                document.getElementById('scoreB').textContent = data.scoreB;
            }
            saveData();
        }

        function update() {
            data.nameA = document.getElementById('nameA').value || 'TEAM A';
            data.nameB = document.getElementById('nameB').value || 'TEAM B';
            saveData();
        }

        function handleLogo(team) {
            const input = document.getElementById('logo' + team);
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    data['logo' + team] = e.target.result;
                    saveData();
                };
                reader.readAsDataURL(file);
            }
        }

        function startTimer() {
            if(!running) {
                running = true;
                timerInterval = setInterval(() => {
                    seconds++;
                    updateTime();
                }, 1000);
            }
        }

        function pauseTimer() {
            running = false;
            clearInterval(timerInterval);
        }

        function setManualTime() {
            const m = parseInt(document.getElementById('min').value) || 0;
            const s = parseInt(document.getElementById('sec').value) || 0;
            seconds = m * 60 + s;
            updateTime();
        }

        function updateTime() {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            data.time = `${m}:${s}`;
            document.getElementById('dispTime').textContent = data.time;
            saveData();
        }

        function setPeriod(p) {
            data.period = p;
            saveData();
        }

        // Завантаження при старті
        const saved = localStorage.getItem('scoreboard');
        if(saved) {
            data = JSON.parse(saved);
            document.getElementById('scoreA').textContent = data.scoreA;
            document.getElementById('scoreB').textContent = data.scoreB;
            document.getElementById('nameA').value = data.nameA;
            document.getElementById('nameB').value = data.nameB;
            document.getElementById('dispTime').textContent = data.time;
        }
    </script>
</body>
</html>
